; M5StickC Plus2 — yellow, ESP32-PICO-V3-02 (Xtensa LX6, CH9102 USB-UART)
; M5StickS3      — grey,   ESP32-S3         (Xtensa LX7, native USB)

[platformio]
default_envs = m5stack-stickc-plus2

[env]
; espressif32 pinned to 6.12.0: pioarduino's v3.x arduino-esp32 doesn't ship
; the m5stick_c variant, so pins_arduino.h isn't found on unpinned latest.
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    https://github.com/inanimate-tech/courier.git
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv

[env:m5stack-stickc-plus2]
; Config from https://docs.m5stack.com/en/core/M5StickC%20PLUS2
; ESP32-PICO-V3-02: 8MB flash + 2MB PSRAM, Quad-SPI
board = m5stick-c
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    -DM5GFX_BOARD=5
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_LOOP_STACK_SIZE=16384

[env:m5sticks3]
; Config from https://docs.m5stack.com/en/core/StickS3
; ESP32-S3: native USB, 8MB flash + 2MB Octal-SPI PSRAM
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
lib_deps =
    ${env.lib_deps}
    M5PM1=https://github.com/m5stack/M5PM1
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
