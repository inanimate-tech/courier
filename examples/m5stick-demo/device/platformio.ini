; M5Stick-Plus2 (ESP32-PICO-V3-02)
; platformio.ini from https://docs.m5stack.com/en/core/M5StickC%20PLUS2

[env:m5stack-stickc-plus2]
; espressif32 pinned to 6.12.0: pioarduino's v3.x arduino-esp32 doesn't ship
; the m5stick_c variant, so pins_arduino.h isn't found on unpinned latest.
platform = espressif32@6.12.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    https://github.com/inanimate-tech/courier.git

; ESP32 PICO-V3-02: 8MB flash + 2MB PSRAM
board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv

build_flags =
    -DM5GFX_BOARD=5
    ; CH9102 USB-to-TTL (not native USB like S3)
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Enable PSRAM (2MB on PICO-V3-02)
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_LOOP_STACK_SIZE=16384