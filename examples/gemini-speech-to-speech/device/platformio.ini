; M5StickC Plus2 — yellow, ESP32-PICO-V3-02 (Xtensa LX6, CH9102 USB-UART)
; M5StickS3      — grey,   ESP32-S3         (Xtensa LX7, native USB, better audio)

[platformio]
default_envs = m5stack-stickc-plus2

[env]
; Matches the m5stick-demo pin for consistency — pioarduino's v3.x
; arduino-esp32 doesn't ship the m5stick_c variant.
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    https://github.com/inanimate-tech/courier.git
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions.csv
; Wi-Fi credentials injected from the shell at flash time — e.g. via
; `op read` from 1Password. Empty when unset, so the captive portal
; flow still runs by default.
build_flags =
    -DWIFI_SSID='"${sysenv.WIFI_SSID}"'
    -DWIFI_PASSWORD='"${sysenv.WIFI_PASSWORD}"'

[env:m5stack-stickc-plus2]
board = m5stick-c
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${env.build_flags}
    -DM5GFX_BOARD=5
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_LOOP_STACK_SIZE=16384

[env:m5sticks3]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
lib_deps =
    ${env.lib_deps}
    M5PM1=https://github.com/m5stack/M5PM1
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
