; Build verification — compiles the gemini-speech-to-speech device example against ESP32
[platformio]
src_dir = ../../../examples/gemini-speech-to-speech/device/src

[env:esp32]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
lib_extra_dirs = ../../../
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.2
    ropg/ezTime@^0.8.3
    m5stack/M5Unified@^0.2.2
build_flags =
    -DWIFI_SSID='""'
    -DWIFI_PASSWORD='""'
