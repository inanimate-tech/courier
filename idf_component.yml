version: "0.3.1"
description: "Batteries-included JSON messaging for ESP32 — WiFi, WebSocket, MQTT, UDP multicast, self-healing reconnection, all handled"
url: "https://github.com/inanimate-tech/courier"
repository: "https://github.com/inanimate-tech/courier.git"
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
dependencies:
  idf:
    # Declared floor matches esp_websocket_client 1.x, which requires IDF 5.0+.
    # Earlier IDF versions can't resolve any compatible esp_websocket_client.
    version: ">=5.0.0"
  espressif/arduino-esp32:
    version: ">=3.0.0"
  espressif/esp_websocket_client:
    version: "^1.0.0"
files:
  # compote does not read .gitignore — we must explicitly exclude build
  # artifacts and dev-only files, or they end up in the published tarball.
  exclude:
    - "**/.pio/**/*"
    - "**/node_modules/**/*"
    - "**/managed_components/**/*"
    - "**/build/**/*"
    - "dist/**/*"
    - "examples/**/*"
    - ".claude/**/*"
    - ".github/**/*"
    - ".vscode/**/*"
    - "docs/superpowers/**/*"
    - "tools/**/*"
    - "test/**/*"
    - "**/.DS_Store"
    - "**/package-lock.json"
    - "**/sdkconfig"
    - "**/sdkconfig.*"
    - "**/dependencies.lock"
    - "CLAUDE.md"
    - "docs/publishing.md"
    - ".gitignore"
